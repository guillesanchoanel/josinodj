<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOSINODJ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }

    .card {
      text-align: center;
      padding: 60px 48px;
      max-width: 440px;
      width: 90%;
    }

    .logo {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(130, 80, 255, 0.4);
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      margin-top: 10px;
      color: #888;
      font-size: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 40px;
      padding: 16px 36px;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .2s, transform .15s;
      box-shadow: 0 4px 24px rgba(124, 58, 237, 0.5);
    }

    .btn:hover { opacity: .88; transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    .btn svg { width: 20px; height: 20px; flex-shrink: 0; }

    .note {
      margin-top: 14px;
      font-size: .82rem;
      color: #555;
    }

    .warning {
      margin-top: 36px;
      padding: 18px 24px;
      background: #1e1a10;
      border: 1px solid #4a3800;
      border-radius: 12px;
      color: #c8a000;
      font-size: .93rem;
      line-height: 1.5;
    }

    .loading { color: #666; margin-top: 40px; font-size: .95rem; }

    #version-badge {
      display: inline-block;
      margin-top: 18px;
      padding: 4px 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 20px;
      font-size: .78rem;
      color: #777;
    }
  </style>
</head>
<body>
<div class="card">
  <img class="logo"
       src="https://raw.githubusercontent.com/guillesanchoanel/josinodj/master/assets/icon.png"
       alt="JOSINODJ"
       onerror="this.style.display='none'">
  <h1>JOSINODJ</h1>
  <p class="tagline">Software de DJ personal para Windows</p>

  <div id="content">
    <p class="loading">Comprobando versión disponible…</p>
  </div>
</div>

<script>
  const REPO = 'guillesanchoanel/josinodj';

  function isWindows() {
    return /Windows/i.test(navigator.userAgent) || /Win/.test(navigator.platform);
  }

  function is64bit() {
    return /Win64|x64|WOW64|x86_64/i.test(navigator.userAgent) || navigator.platform === 'Win64';
  }

  function render(html) {
    document.getElementById('content').innerHTML = html;
  }

  if (!isWindows()) {
    render(`<div class="warning">
      ⚠️ JOSINODJ solo está disponible para <strong>Windows</strong>.<br>
      Tu sistema operativo no es compatible.
    </div>`);
  } else if (!is64bit()) {
    render(`<div class="warning">
      ⚠️ JOSINODJ requiere <strong>Windows de 64 bits</strong>.<br>
      Tu sistema parece ser de 32 bits y no es compatible.
    </div>`);
  } else {
    fetch('https://api.github.com/repos/' + REPO + '/releases/latest')
      .then(r => r.json())
      .then(data => {
        const version = (data.tag_name || '').replace('v', '');
        const asset = (data.assets || []).find(a => a.name.endsWith('.zip'));
        if (!asset) { render('<p class="loading">No hay versión disponible aún.</p>'); return; }

        render(`
          <a class="btn" href="${asset.browser_download_url}" download>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M12 3v13M7 11l5 5 5-5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M3 20h18" stroke-linecap="round"/>
            </svg>
            Descargar para Windows
          </a>
          <p class="note">Extrae el .zip y ejecuta INSTALAR.bat como administrador</p>
          <span id="version-badge">v${version} · Windows 64-bit</span>
        `);
      })
      .catch(() => {
        render(`<div class="warning">No se pudo obtener la versión más reciente.<br>
          <a href="https://github.com/${REPO}/releases/latest" style="color:#c8a000">
            Ver en GitHub →
          </a></div>`);
      });
  }
</script>
</body>
</html>
